name: Evently CI/CD

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Build & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Lint
        run: npm run lint

      - name: Build (test build)
        run: npm run build
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"
          NEXTAUTH_SECRET: "ci-secret"
          NEXTAUTH_URL: "http://localhost:3000"
          AUTH_TRUST_HOST: "true"
          STRIPE_SECRET_KEY: "sk_test_ci_placeholder"

  deploy:
    name: Deploy to VPS
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.INFOMANIAK_HOST }}
          username: ${{ secrets.INFOMANIAK_USER }}
          key: ${{ secrets.INFOMANIAK_SSH_KEY }}
          envs: GITHUB_REF
          script: |
            set -e

            BRANCH="${{ github.ref_name }}"

            echo "Deploying branch: $BRANCH"

            cd /var/www/evently

            # Sync repo
            git fetch origin
            git checkout $BRANCH
            git pull origin $BRANCH

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 20

            # Install deps (prisma CLI is in devDependencies; always install full deps)
            npm ci

            npx prisma generate

            # Set ENV (comes from environment secrets automatically)
            export DATABASE_URL='${{ secrets.DATABASE_URL }}'
            export DIRECT_URL='${{ secrets.DIRECT_URL }}'
            export NEXTAUTH_SECRET='${{ secrets.NEXTAUTH_SECRET }}'
            export NEXTAUTH_URL='${{ secrets.NEXTAUTH_URL }}'
            export AUTH_TRUST_HOST='${{ secrets.AUTH_TRUST_HOST }}'
            export RESEND_API_KEY='${{ secrets.RESEND_API_KEY }}'
            export RESEND_FROM_EMAIL='${{ secrets.RESEND_FROM_EMAIL }}'
            export STRIPE_SECRET_KEY='${{ secrets.STRIPE_SECRET_KEY }}'

            # Run migrations
            npx prisma migrate deploy

            # Build
            npm run build

            # Restart correct app
            if [ "$BRANCH" = "main" ]; then
              echo "PRODUCTION"
              pm2 reload evently-prod --update-env
            elif [ "$BRANCH" = "dev" ]; then
              echo "DEVELOPMENT"
              pm2 reload evently-dev --update-env
            fi

            echo "Deploy finished"

      - name: Install dependencies (for smoke test)
        if: github.ref == 'refs/heads/dev'
        run: npm ci

      - name: Install Playwright Chromium
        if: github.ref == 'refs/heads/dev'
        run: npx playwright install --with-deps chromium

      - name: Run dev smoke E2E
        if: github.ref == 'refs/heads/dev'
        run: npm run test:e2e:dev-smoke
        env:
          PLAYWRIGHT_BASE_URL: "https://dev.evently.swiss"
          E2E_ADMIN_EMAIL: ${{ secrets.DEV_SMOKE_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.DEV_SMOKE_ADMIN_PASSWORD }}
          E2E_GUEST_EMAIL: ${{ secrets.DEV_SMOKE_GUEST_EMAIL }}
