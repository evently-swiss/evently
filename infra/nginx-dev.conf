# Nginx vhost — dev.evently.swiss
# Proxies to PM2 app evently-dev on port 3001.
# Install: sudo ln -s /var/www/evently/infra/nginx-dev.conf /etc/nginx/sites-enabled/evently-dev
# Then: sudo nginx -t && sudo systemctl reload nginx
# TLS: sudo certbot --nginx -d dev.evently.swiss

server {
    listen 80;
    server_name dev.evently.swiss;

    # Redirect HTTP to HTTPS (Certbot will fill this in)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dev.evently.swiss;

    # TLS — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/dev.evently.swiss/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.evently.swiss/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to Next.js dev app
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass       http://127.0.0.1:3001;
        add_header       Cache-Control "public, max-age=31536000, immutable";
    }

    access_log /var/log/nginx/evently-dev-access.log;
    error_log  /var/log/nginx/evently-dev-error.log;
}
